name: Publish to npm

# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
#
# One-time setup (after the package's first publish exists on npm):
#   npmjs.com → package → Settings → Trusted Publisher → GitHub Actions
#     Organization/user: shayanline
#     Repository:        msloop-mcp
#     Workflow filename: publish.yml
#
# npm can only register a trusted publisher for a package that already exists,
# so the very first version must be published once manually (npm login && npm publish).
# Every release after that publishes through this workflow with zero secrets.

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing + provenance

    steps:
      - uses: actions/checkout@v6

      # Node 24 ships npm >= 11.5.1, the minimum that supports trusted publishing.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # No NODE_AUTH_TOKEN: the npm CLI mints a short-lived token from the GitHub
      # OIDC identity and emits provenance automatically.
      - name: Publish to npm
        run: npm publish --access public
